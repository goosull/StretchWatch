name: StretchWatch
options:
  bundleIdPrefix: com.goosull.stretchwatch
  deploymentTarget:
    iOS: "18.0"
    watchOS: "10.0"
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    # Signing: set your team in Xcode (Signing & Capabilities) or here.
    # DEVELOPMENT_TEAM: "XXXXXXXXXX"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  # ---------- iOS companion ----------
  StretchWatch:
    type: application
    platform: iOS
    sources:
      - iOSApp
      - Shared
    dependencies:
      - target: StretchWatch Watch App
        embed: true
    info:
      path: iOSApp/Info.plist
      properties:
        CFBundleDisplayName: StretchWatch
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: iOSApp/StretchWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.goosull.stretchwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goosull.stretchwatch
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ---------- macOS menu-bar coach ----------
  StretchWatch Mac:
    type: application
    platform: macOS
    sources:
      - MacApp
      - Shared/Stretch.swift
      - Shared/StretchSnapshot.swift
      - Shared/Theme.swift
    resources:
      - Shared/Localizable.xcstrings
    info:
      path: MacApp/Info.plist
      properties:
        CFBundleDisplayName: StretchWatch
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goosull.stretchwatch.mac
        PRODUCT_NAME: StretchWatch
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ARCHS: "$(ARCHS_STANDARD)"
        ONLY_ACTIVE_ARCH: NO
        SWIFT_EMIT_LOC_STRINGS: YES

  # ---------- watchOS app (single-target, watchOS 10+) ----------
  StretchWatch Watch App:
    type: application
    platform: watchOS
    sources:
      - WatchApp
      - Shared
    dependencies:
      - target: StretchWatch Complication
        embed: true
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: StretchWatch
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.goosull.stretchwatch
        NSMotionUsageDescription: "StretchWatch checks your recent movement to tell when you've been sitting a while, so it can remind you to stretch."
        NSHealthUpdateUsageDescription: "StretchWatch can log each completed stretch as mindful minutes in Apple Health, if you turn it on in Settings."
    entitlements:
      path: WatchApp/StretchWatchWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.goosull.stretchwatch
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goosull.stretchwatch.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ---------- unit tests (pure logic, iOS host) ----------
  StretchWatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goosull.stretchwatch.tests
        GENERATE_INFOPLIST_FILE: YES

  StretchWatch Mac Tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      - MacTests
      - Shared
      - MacApp/Session/MacSessionTypes.swift
      - MacApp/Session/MacSessionCoordinator.swift
      - MacApp/Storage/MacSQLiteStateStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goosull.stretchwatch.mac.tests
        GENERATE_INFOPLIST_FILE: YES

  # ---------- watch complication (WidgetKit extension) ----------
  StretchWatch Complication:
    type: app-extension
    platform: watchOS
    sources:
      - Complication
      - Shared
    info:
      path: Complication/Info.plist
      properties:
        CFBundleDisplayName: StretchWatch
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Complication/StretchComplication.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.goosull.stretchwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goosull.stretchwatch.watchkitapp.complication
